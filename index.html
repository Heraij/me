<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator+ | My Hardests</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Big Glowing Header Link -->
        <header>
            <a href="https://gdbrowser.com/u/creatorplus100" target="_blank" class="glow-header">КреаторПлус</a>
            <p class="subtitle">I spent the past 4-5 years of my life playing this silly cube game. :3</p>
        </header>

        <!-- Navigation Section -->
        <nav class="nav-bar">
            <a href="index.html" class="active">Main</a>
            <a href="list.html">List</a>
            <a href="stats.html">Stats</a>
            <a href="levels.html">Levels</a>
        </nav>

        <!-- Video Embed Section -->
        <main class="video-section">
            <div class="video-wrapper" id="video-container">
                <p class="loading">Loading featured...</p>
            </div>
        </main>

        <!-- Goals Panel -->
        <section class="goals-panel">
            <h2>Goals:</h2>
            <ul id="goals-list" class="goals-list">
                <li class="loading">Loading goals...</li>
            </ul>
        </section>

        <hr class="section-divider">

        <section class="demons-section">
            <h2>Demons</h2>
            <div id="demons-container" class="demons-grid">
                <p class="loading">Loading top demons...</p>
            </div>
        </section>

        <section class="chart-section">
            <h3>Top skills</h3>
            <div class="chart-wrapper">
                <canvas id="skillsetChart"></canvas>
            </div>
        </section>

        <div id="subpage-modal" class="modal">
            <div class="modal-content">
                <button class="close-btn" onclick="closeSubpage()">&times;</button>
                <div id="subpage-data">
                    </div>
            </div>
        </div>

        <!-- Footer with Working View Counter -->
        <footer>
            <div class="views-panel">
                <span class="views-label">Total Visits</span>
                <span id="view-count" class="views-number">000000</span>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
